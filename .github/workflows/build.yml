                  };
                  089C166BFE840E0C002EA6DB = {
                      isa = PBXSourcesBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                          089C1659FE840E0C002EA6DB,
                          089C165AFE840E0C002EA6DB,
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
                  089C166CFE840E0C002EA6DB = {
                      isa = PBXResourcesBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                          089C1658FE840E0C002EA6DB,
                          089C165BFE840E0C002EA6DB,
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
              };
              rootObject = 089C165FFE840E0C002EA6DB;
          }
          EOF

      - name: 编译生成未签名IPA
        run: |
          cd DCDFilter
          xcodebuild -project DCDFilter.xcodeproj -scheme DCDFilter -configuration Release -archivePath DCDFilter.xcarchive archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          xcodebuild -exportArchive \
            -archivePath DCDFilter.xcarchive \
            -exportPath . \
            -exportOptionsPlist ../exportOptions.plist

      - name: 上传IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: 查找充电券-未签名IPA
          path: DCDFilter/DCDFilter.ipa
