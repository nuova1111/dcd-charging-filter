name: 自动打包iOS未签名IPA
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成IPA（无需编译，直接替换文件）
        run: |
          # 下载我预先编译好的空白WKWebView IPA模板
          wget -q https://github.com/nuova1111/blank-ios-webview/releases/download/v1.0/BlankWebView.ipa
          
          # 解压IPA
          unzip -q BlankWebView.ipa
          
          # 复制你的index.html到应用中
          cp index.html Payload/BlankWebView.app/
          
          # 重新打包成IPA
          zip -q -r 查找充电券.ipa Payload/

      - name: 上传IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: 查找充电券-未签名IPA
          path: 查找充电券.ipa
