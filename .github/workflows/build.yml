name: 自动打包iOS未签名IPA
on: [push]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建纯原生WKWebView项目
        run: |
          # 创建主项目目录
          mkdir -p DCDFilter
          cd DCDFilter

          # 创建Info.plist
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.dcd.charging.filter</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>查找充电券</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
                  <key>UISceneConfigurations</key>
                  <dict>
                      <key>UIWindowSceneSessionRoleApplication</key>
                      <array>
                          <dict>
                              <key>UISceneConfigurationName</key>
                              <string>Default Configuration</string>
                              <key>UISceneDelegateClassName</key>
                              <string>SceneDelegate</string>
                          </dict>
                      </array>
                  </dict>
              </dict>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

          # 创建AppDelegate.swift
          cat > AppDelegate.swift << 'EOF'
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  return true
              }
          }
          EOF

          # 创建SceneDelegate.swift（核心：WKWebView加载本地HTML）
          cat > SceneDelegate.swift << 'EOF'
          import UIKit
          import WebKit

          class SceneDelegate: UIResponder, UIWindowSceneDelegate {
              var window: UIWindow?

              func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions) {
                  guard let windowScene = (scene as? UIWindowScene) else { return }
                  
                  let window = UIWindow(windowScene: windowScene)
                  self.window = window
                  
                  let webView = WKWebView(frame: window.bounds)
                  webView.configuration.preferences.javaScriptEnabled = true
                  
                  // 强制所有链接在外部浏览器打开
                  webView.navigationDelegate = self
                  
                  // 加载本地index.html
                  if let url = Bundle.main.url(forResource: "index", withExtension: "html") {
                      webView.loadFileURL(url, allowingReadAccessTo: url.deletingLastPathComponent())
                  }
                  
                  window.rootViewController = UIViewController()
                  window.rootViewController?.view = webView
                  window.makeKeyAndVisible()
              }
          }

          extension SceneDelegate: WKNavigationDelegate {
              func webView(_ webView: WKWebView, decidePolicyFor navigationAction: WKNavigationAction, decisionHandler: @escaping (WKNavigationActionPolicy) -> Void) {
                  // 只有本地文件允许在WebView内打开
                  if navigationAction.request.url?.isFileURL == true {
                      decisionHandler(.allow)
                      return
                  }
                  
                  // 所有外部链接都跳转到系统浏览器
                  if let url = navigationAction.request.url {
                      UIApplication.shared.open(url)
                  }
                  decisionHandler(.cancel)
              }
          }
          EOF

          # 创建启动页
          cat > LaunchScreen.storyboard << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="22505" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_1" orientation="portrait" appearance="light"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="22504"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <color key="backgroundColor" red="1" green="1" blue="1" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                              </view>
                          </viewController>
                      </objects>
                  </scene>
              </scenes>
          </document>
          EOF

          # 复制你的index.html文件到项目中
          cp ../index.html .

          # 关键修复：先创建Xcode项目目录
          mkdir -p DCDFilter.xcodeproj

          # 创建Xcode项目文件
          cat > DCDFilter.xcodeproj/project.pbxproj << 'EOF'
          // !$*UTF8*$!
          {
              archiveVersion = 1;
              classes = {
              };
              objectVersion = 56;
              objects = {
                  089C1658FE840E0C002EA6DB = {
                      isa = PBXFileReference;
                      lastKnownFileType = text.html;
