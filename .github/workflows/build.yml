                  };
                  089C165DFE840E0C002EA6DB = {
                      isa = PBXGroup;
                      children = (
                          089C1658FE840E0C002EA6DB,
                          089C1659FE840E0C002EA6DB,
                          089C165AFE840E0C002EA6DB,
                          089C165BFE840E0C002EA6DB,
                          089C165CFE840E0C002EA6DB,
                      );
                      path = DCDFilter;
                      sourceTree = "<group>";
                  };
                  089C165EFE840E0C002EA6DB = {
                      isa = PBXGroup;
                      children = (
                          089C165DFE840E0C002EA6DB,
                      );
                      name = DCDFilter;
                      sourceTree = "<group>";
                  };
                  089C165FFE840E0C002EA6DB = {
                      isa = PBXProject;
                      buildConfigurationList = 089C1662FE840E0C002EA6DB;
                      compatibilityVersion = "Xcode 14.0";
                      hasScannedForEncodings = 0;
                      mainGroup = 089C165EFE840E0C002EA6DB;
                      productRefGroup = 089C1660FE840E0C002EA6DB;
                      projectDirPath = "";
                      projectRoot = "";
                      targets = (
                          089C1666FE840E0C002EA6DB,
                      );
                  };
                  089C1660FE840E0C002EA6DB = {
                      isa = PBXGroup;
                      children = (
                          089C1667FE840E0C002EA6DB,
                      );
                      name = Products;
                      sourceTree = "<group>";
                  };
                  089C1662FE840E0C002EA6DB = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          089C1663FE840E0C002EA6DB,
                          089C1664FE840E0C002EA6DB,
                      );
                      defaultConfigurationIsVisible = 0;
                      defaultConfigurationName = Release;
                  };
                  089C1663FE840E0C002EA6DB = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          ARCHS = arm64;
                          CODE_SIGN_IDENTITY = "";
